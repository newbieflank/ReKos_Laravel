<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerAdmin webmaster@localhost
        DocumentRoot /var/www/html/public

        # Mengaktifkan mesin SSL
        SSLEngine on
        
        # Jalur ini harus persis dengan mapping volume di docker-compose.yml
        SSLCertificateFile /etc/apache2/ssl/cloudflare.crt
        SSLCertificateKeyFile /etc/apache2/ssl/cloudflare.key

        <Directory /var/www/html/public>
            Options Indexes FollowSymLinks
            AllowOverride All
            Require all granted
        </Directory>

        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined
    </VirtualHost>
</IfModule>
