version: '3.8'

services:
  app:
    image: sonuafriza/rekos-laravel:latest
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=rekos_db
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - /var/www/html/rekos-laravel/storage/app/public:/var/www/html/storage/app/public
      - /var/www/html/rekos-laravel/.env:/var/www/html/.env:ro
      - /var/www/html/rekos-laravel/certs:/etc/apache2/ssl:ro
    depends_on:
      - db
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: on-failure

  queue:
    image: sonuafriza/rekos-laravel:latest
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=rekos_db
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - /var/www/html/rekos-laravel/storage/app/public:/var/www/html/storage/app/public
      - /var/www/html/rekos-laravel/.env:/var/www/html/.env
    depends_on:
      - db
      - app
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: any

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=rekos_db
    volumes:
      - db_data:/var/lib/mysql
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512M

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
    depends_on:
      - db
    deploy:
      placement:
        constraints:
          - node.role == manager

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080" 
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

volumes:
  db_data: 

networks:
  default:
    driver: overlay
    driver_opts:
      com.docker.network.driver.mtu: "1400"