version: '3.8'

services:
  app:
    image: sonuafriza/rekos-laravel:latest 
    container_name: rekos_app
    restart: always
    ports:
      - "8000:80" 
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=rekos_db
      - DB_USERNAME=root
      - DB_PASSWORD=123qweasd
    volumes:
      - rekos_storage:/var/www/html/storage/app/public
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: rekos_db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=123qweasd
      - MYSQL_DATABASE=rekos_db
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  rekos_storage:
