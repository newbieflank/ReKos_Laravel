name: Deploy Laravel to VPS

on:
  push:
    branches:
      - main  # CI/CD berjalan khusus untuk branch ini

jobs:
  testing:
    name: Run Dusk Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite
          
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Prepare Environment
        run: |
          # Gunakan .env.dusk.local sebagai template (sudah berisi konfigurasi SQLite)
          cp .env.dusk.local .env
          sed -i "s|DB_DATABASE=.*|DB_DATABASE=$(pwd)/database/dusk.sqlite|g" .env

          echo "MIDTRANS_SERVER_KEY=${{ secrets.MIDTRANS_SERVER_KEY }}" >> .env
          echo "MIDTRANS_CLIENT_KEY=${{ secrets.MIDTRANS_CLIENT_KEY }}" >> .env
          echo "MIDTRANS_MERCHANT_ID=${{ secrets.MIDTRANS_MERCHANT_ID }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env

          php artisan key:generate
          
      - name: Create SQLite Database
        run: |
          mkdir -p database
          touch database/dusk.sqlite
          php artisan migrate --force
          
      - name: Upgrade Chrome Driver
        run: php artisan dusk:chrome-driver --detect

      - name: Start Web Server
        run: |
          php artisan serve &
          sleep 3 
        
      - name: Run Dusk Tests
        run: php artisan dusk

  build:
    name: Build Docker Image
    needs: testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: sonuafriza/rekos-laravel:latest

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/var/www/html/rekos-laravel/"

      - name: Execute Deployment on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }} 
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DB_PASSWORD 
          script: |
            cd /var/www/html/rekos-laravel
            export DB_PASSWORD=$DB_PASSWORD
            
            docker pull sonuafriza/rekos-laravel:latest
            
            echo "Deploying ke Docker Swarm..."
            docker stack deploy --with-registry-auth --resolve-image=always -c docker-compose.yml rekos_cluster
            
            # Tunggu sebentar agar database siap dan network tersedia
            sleep 15
            
            echo "Menjalankan migrasi database..."
            docker run --rm --network rekos_cluster_default \
              -e DB_CONNECTION=mysql \
              -e DB_HOST=db \
              -e DB_PORT=3306 \
              -e DB_DATABASE=rekos_db \
              -e DB_USERNAME=root \
              -e DB_PASSWORD=$DB_PASSWORD \
              sonuafriza/rekos-laravel:latest php artisan migrate --force
              
            echo "Deployment dan optimasi berhasil! Kontainer baru otomatis bersih dari cache."