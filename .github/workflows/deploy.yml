name: Deploy Laravel to VPS

on:
  push:
    branches:
      - main  # CI/CD berjalan khusus untuk branch ini

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Mengambil kode terbaru dari GitHub
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Login ke Docker Hub menggunakan Secrets
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. Merakit Docker Image (Build) & mengirim ke Docker Hub (Push)
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: sonuafriza/rekos-laravel:latest

    # 4. Mengirim file docker-compose ke VPS (SCP)
    - name: Copy docker-compose to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        source: "docker-compose.yml"
        target: "/var/www/html/rekos-laravel/"

    # 5. Remote VPS via SSH untuk mengeksekusi aplikasi
    - name: Execute Deployment on VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /var/www/html/rekos-laravel
          docker compose pull
          docker compose up -d
          docker exec rekos_app bash -c "if [ ! -f .env ]; then cp .env.example .env && php artisan key:generate; fi"
          docker exec rekos_app bash -c "if [ ! -d public/storage ]; then php artisan storage:link; fi"
